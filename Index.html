<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>M-Flow Future Control Hub (Mobile Optimized)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Kanit:wght@200;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-cyan: #00f2ff;
            --neon-blue: #0062ff;
            --bg-dark: #020617;
            --panel-bg: rgba(15, 23, 42, 0.8);
            --neon-yellow: #fde047;
        }

        body {
            font-family: 'Kanit', sans-serif;
            background-color: var(--bg-dark);
            color: #f8fafc;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            display: flex;
            flex-direction: row;
        }

        .font-future { font-family: 'Orbitron', sans-serif; }

        .bg-grid {
            background-image: 
                linear-gradient(to right, rgba(0, 242, 255, 0.05) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(0, 242, 255, 0.05) 1px, transparent 1px);
            background-size: 30px 30px;
            position: fixed;
            inset: 0;
            z-index: -1;
            mask-image: radial-gradient(circle at center, black, transparent 90%);
        }

        /* --- Sidebar Right Side --- */
        .sidebar-right {
            width: 70px;
            height: 100vh;
            background: rgba(2, 6, 23, 0.9);
            backdrop-filter: blur(15px);
            border-left: 1px solid rgba(0, 242, 255, 0.2);
            display: flex;
            flex-direction: column;
            transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 100;
            flex-shrink: 0;
        }

        .sidebar-right.expanded {
            width: 260px;
        }

        .nav-scroll-area {
            flex: 1;
            overflow-y: auto;
            scrollbar-width: none;
            -ms-overflow-style: none;
            padding: 10px 0;
        }

        .nav-scroll-area::-webkit-scrollbar { display: none; }

        .nav-item {
            display: flex;
            align-items: center;
            width: 100%;
            padding: 12px 18px;
            margin-bottom: 4px;
            transition: all 0.2s;
            white-space: nowrap;
            border-right: 3px solid transparent;
        }

        .nav-item.active-menu {
            background: linear-gradient(270deg, rgba(0, 242, 255, 0.15) 0%, transparent 100%);
            border-right: 3px solid var(--neon-cyan);
            color: var(--neon-cyan);
        }

        .nav-text {
            margin-left: 15px;
            font-size: 13px;
            opacity: 0;
            transition: opacity 0.2s;
            pointer-events: none;
        }

        .expanded .nav-text {
            opacity: 1;
            pointer-events: auto;
        }

        /* --- Main Content & Scrolling Logic --- */
        main {
            flex: 1;
            height: 100vh;
            position: relative;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .glass-panel {
            background: var(--panel-bg);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        /* Fixed Container for Apps */
        #stack-container {
            flex: 1;
            position: relative;
            background: #000;
            overflow: hidden;
        }

        .app-container {
            position: absolute;
            inset: 0;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
            z-index: 10;
            /* เปิดการสกอล์แนวตั้งที่นี่เพื่อให้ครอบคลุม iframe ทั้งหมด */
            overflow-y: scroll; 
            overflow-x: hidden;
            -webkit-overflow-scrolling: touch;
        }

        .app-container.active {
            opacity: 1;
            pointer-events: auto;
        }

        /* ปรับ Iframe ให้สูงตามเนื้อหาหรืออย่างน้อยเต็มจอ */
        iframe {
            width: 100%;
            height: 100%;
            min-height: 100%;
            border: none;
            background: #fff;
            display: block;
        }

        /* Quick Note UI */
        #note-trigger {
            position: fixed;
            bottom: 20px;
            left: 20px;
            z-index: 90;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: var(--neon-cyan);
            color: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.4);
            cursor: pointer;
        }

        #quick-note-modal {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.8);
            z-index: 200;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        /* Status & Alerts */
        @keyframes pulse-yellow {
            0% { box-shadow: 0 0 0 0 rgba(253, 224, 71, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(253, 224, 71, 0); }
            100% { box-shadow: 0 0 0 0 rgba(253, 224, 71, 0); }
        }
        .alert-active { animation: pulse-yellow 2s infinite; }

        #logout-overlay {
            position: fixed;
            inset: 0;
            z-index: 1000;
            background: #020617;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        @media (max-width: 640px) {
            #digital-clock { font-size: 1.1rem; }
        }
    </style>
</head>
<body>
    <div class="bg-grid"></div>

    <main id="main-content">
        <!-- Top Status Bar -->
        <header class="h-14 flex items-center justify-between px-4 border-b border-white/5 glass-panel z-50 shrink-0">
            <div class="flex items-center gap-2">
                <div class="w-2 h-2 rounded-full bg-green-500 shadow-[0_0_8px_rgba(34,197,94,0.6)]"></div>
                <h1 class="font-future text-[10px] text-cyan-400 tracking-widest uppercase" id="current-app-name">M-FLOW HUB</h1>
            </div>
            
            <div id="digital-clock" class="font-future text-cyan-400 font-bold tracking-tighter">00:00:00</div>

            <button onclick="closeCurrentApp()" class="text-slate-400 hover:text-white p-1">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
            </button>
        </header>

        <!-- SLA Alert -->
        <div id="sla-alert" class="hidden absolute top-16 left-4 right-4 z-[60]">
            <div class="glass-panel border-yellow-400/50 p-3 rounded-xl flex items-center justify-between alert-active bg-yellow-400/10">
                <div class="flex items-center gap-2">
                    <span class="text-xl">🔔</span>
                    <p class="text-[10px] text-yellow-400 font-bold uppercase leading-tight">รอบเวลา SLA 3 ชม.</p>
                </div>
                <button onclick="switchApp('sla', 'SLA 3 ชั่วโมง'); hideSlaAlert()" class="bg-yellow-400 text-black text-[9px] font-bold px-3 py-1 rounded-full">เปิดดู</button>
            </div>
        </div>

        <!-- Iframe Stack View -->
        <div id="stack-container">
            <!-- Content will be injected here via JS -->
            <div id="desktop-grid" class="absolute inset-0 flex flex-col items-center justify-center p-6 text-center z-0">
                <div class="w-20 h-20 mb-6 text-cyan-500/20">
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1" d="M12 21a9 9 0 100-18 9 9 0 000 18z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 10l2 2 4-4"></path></svg>
                </div>
                <h2 class="font-future text-xl text-cyan-400 tracking-widest uppercase mb-2">System Ready</h2>
                <p class="text-[11px] text-slate-500 leading-relaxed">เลือกเครื่องมือที่ต้องการจากแถบเมนู<br>ทางด้านขวาเพื่อเริ่มทำงาน</p>
            </div>
        </div>
    </main>

    <!-- Sidebar Right -->
    <aside id="main-sidebar" class="sidebar-right">
        <div class="h-14 flex items-center justify-center border-b border-white/5 cursor-pointer shrink-0" onclick="toggleSidebar()">
            <div class="w-8 h-8 rounded-lg bg-cyan-500 flex items-center justify-center shadow-[0_0_10px_rgba(0,242,255,0.3)]">
                <svg class="w-5 h-5 text-black" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
            </div>
        </div>

        <nav class="nav-scroll-area" id="nav-container"></nav>

        <div class="p-4 border-t border-white/5 shrink-0">
            <button onclick="handleLogoutClick()" id="logout-btn" class="w-10 h-10 mx-auto flex items-center justify-center rounded-lg bg-red-500/10 text-red-500 border border-red-500/20">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path></svg>
            </button>
        </div>
    </aside>

    <!-- Floating Note -->
    <div id="note-trigger" onclick="openNote()">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"></path></svg>
    </div>

    <div id="quick-note-modal" onclick="closeNoteOutside(event)">
        <div class="w-full max-w-sm glass-panel p-5 rounded-3xl" onclick="event.stopPropagation()">
            <div class="flex justify-between items-center mb-4">
                <span class="font-future text-cyan-400 text-xs tracking-widest">QUICK NOTE</span>
                <button onclick="closeNote()" class="text-slate-400 p-1">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>
            <textarea id="quick-note-area" class="w-full h-48 bg-slate-950/50 border border-white/10 rounded-xl p-3 text-sm focus:border-cyan-500 outline-none text-white mb-3" placeholder="พิมพ์หมายเลขทะเบียน..."></textarea>
            <button onclick="clearNote()" class="w-full py-2 border border-red-500/30 text-red-500 text-[10px] uppercase rounded-lg">Clear All</button>
        </div>
    </div>

    <!-- Login/Welcome -->
    <div id="welcome-screen" class="fixed inset-0 z-[500] bg-slate-950 flex flex-col items-center justify-center p-8 transition-transform duration-700">
        <div class="w-20 h-20 border-2 border-cyan-500/20 rounded-full flex items-center justify-center mb-8 animate-pulse">
            <svg class="w-10 h-10 text-cyan-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
        </div>
        <h1 class="font-future text-2xl text-white font-bold tracking-tighter mb-2 text-center uppercase">M-FLOW CONTROL</h1>
        <p class="text-cyan-500/60 text-[10px] tracking-[0.4em] mb-12 uppercase">Future Workspace</p>
        <button onclick="enterSystem()" id="login-btn" class="w-full py-4 bg-cyan-600 text-white font-bold rounded-2xl shadow-xl shadow-cyan-900/20 active:scale-95 transition-transform">เข้าสู่ระบบ</button>
    </div>

    <!-- Preload -->
    <div id="preload-overlay" class="fixed inset-0 z-[600] bg-black/80 backdrop-blur-md hidden flex-col items-center justify-center">
        <div class="w-12 h-12 border-4 border-cyan-500 border-t-transparent rounded-full animate-spin mb-4"></div>
        <p class="font-future text-cyan-400 text-[10px] tracking-widest uppercase">Syncing Modules <span id="preload-count">0</span>%</p>
    </div>

    <!-- Logout -->
    <div id="logout-overlay">
        <div class="w-12 h-12 border-4 border-red-500 border-t-transparent rounded-full animate-spin mb-4"></div>
        <p class="font-future text-red-500 text-xs uppercase tracking-widest">Logging Out...</p>
    </div>

    <script>
        const APPS = [
            { id: 'sla', name: 'SLA 3 ชั่วโมง', url: 'https://sla-temp.vercel.app/', icon: '⏱️' },
            { id: 'r05', name: 'ชนข้อมูลต่างๆ', url: 'https://r05-vs-tcvs.vercel.app/', icon: '📊' },
            { id: 'r05-8gb', name: 'ชนข้อมูลสำหรับแรม 8 GB', url: 'https://r05-tcvs-v2.vercel.app/', icon: '⚡', sub: true },
            { id: 'dispute-find', name: 'หาเหตุผลไม่เจอ TCVS', url: 'https://dispult.vercel.app/', icon: '🔍' },
            { id: 'pinai', name: 'ทำพินัย', url: 'https://pinai.vercel.app/', icon: '📜' },
            { id: 'multi-dis', name: 'โต้แย้งหลายทะเบียน', url: 'https://multi-dispul.vercel.app/', icon: '🚗' },
            { id: 'single-dis', name: 'โต้แย้ง 1 ทะเบียน', url: 'https://dupit.netlify.app/', icon: '📍' },
            { id: 'log-l', name: 'แยก Log L', url: 'https://log-l.vercel.app/', icon: '📝' },
            { id: 'tg-ยอด', name: 'ทำยอด TG', url: 'https://tg-five-xi.vercel.app/', icon: '📈' },
            { id: 'temp-press', name: 'ทำยอดกดน้อง Temp', url: 'https://temp3hours.vercel.app/', icon: '💡' },
            { id: 'temp-wrong', name: 'ลงยอดผิด Temp', url: 'https://temp-wong.vercel.app/', icon: '⚠️' },
            { id: 'excel-include', name: 'รวมช่อง Excel', url: 'https://include-sentences.vercel.app/', icon: '📂' }
        ];

        let loadedApps = {};
        let isPreloaded = false;
        let lastAlertHour = -1;
        const SLA_HOURS = [6, 9, 12, 15, 18, 21];

        function updateClock() {
            const now = new Date();
            const h = now.getHours();
            const m = now.getMinutes();
            const s = now.getSeconds();
            document.getElementById('digital-clock').innerText = `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
            if (SLA_HOURS.includes(h) && m === 0 && s === 0 && lastAlertHour !== h) {
                showSlaAlert();
                lastAlertHour = h;
            }
        }
        setInterval(updateClock, 1000);

        function showSlaAlert() { document.getElementById('sla-alert').classList.remove('hidden'); }
        function hideSlaAlert() { document.getElementById('sla-alert').classList.add('hidden'); }

        function toggleSidebar() {
            document.getElementById('main-sidebar').classList.toggle('expanded');
        }

        window.onload = () => {
            const nav = document.getElementById('nav-container');
            APPS.forEach(app => {
                const btn = document.createElement('button');
                btn.className = `nav-item ${app.sub ? 'opacity-70' : ''}`;
                btn.setAttribute('data-id', app.id);
                btn.onclick = () => {
                    switchApp(app.id, app.name);
                    if (window.innerWidth < 1024) document.getElementById('main-sidebar').classList.remove('expanded');
                };
                btn.innerHTML = `
                    <span class="text-xl min-w-[34px] text-center">${app.icon}</span>
                    <span class="nav-text font-medium text-slate-300">${app.name}</span>
                `;
                nav.appendChild(btn);
            });
            updateClock();
        };

        async function enterSystem() {
            const btn = document.getElementById('login-btn');
            btn.innerHTML = "PREPARING SYSTEM...";
            if (!isPreloaded) await preloadAllApps();
            document.getElementById('welcome-screen').style.transform = "translateY(-100%)";
        }

        async function preloadAllApps() {
            const overlay = document.getElementById('preload-overlay');
            const container = document.getElementById('stack-container');
            overlay.classList.remove('hidden');
            let completed = 0;
            for (const app of APPS) {
                const wrap = document.createElement('div');
                wrap.className = 'app-container';
                wrap.id = `wrap-${app.id}`;
                const iframe = document.createElement('iframe');
                iframe.setAttribute('allow', 'clipboard-write');
                // แก้ไขเพื่อให้ Scroll ได้ดีขึ้นบน iOS
                iframe.setAttribute('scrolling', 'yes');
                wrap.appendChild(iframe);
                container.appendChild(wrap);
                iframe.src = app.url;
                loadedApps[app.id] = wrap;
                completed++;
                document.getElementById('preload-count').innerText = Math.round((completed / APPS.length) * 100);
                await new Promise(r => setTimeout(r, 100));
            }
            isPreloaded = true;
            overlay.classList.add('hidden');
        }

        function switchApp(id, name) {
            document.getElementById('desktop-grid').classList.add('hidden');
            document.getElementById('current-app-name').innerText = name;
            document.querySelectorAll('.app-container').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active-menu'));
            const activeNav = document.querySelector(`[data-id="${id}"]`);
            if(activeNav) activeNav.classList.add('active-menu');
            if (loadedApps[id]) {
                loadedApps[id].classList.add('active');
                // รีเซ็ตตำแหน่ง Scroll ไปด้านบนสุดเมื่อเปิดแอปใหม่
                loadedApps[id].scrollTop = 0;
            }
        }

        function closeCurrentApp() {
            document.getElementById('desktop-grid').classList.remove('hidden');
            document.getElementById('current-app-name').innerText = "M-FLOW HUB";
            document.querySelectorAll('.app-container').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active-menu'));
        }

        function openNote() { document.getElementById('quick-note-modal').style.display = 'flex'; }
        function closeNote() { document.getElementById('quick-note-modal').style.display = 'none'; }
        function closeNoteOutside(e) { if(e.target.id === 'quick-note-modal') closeNote(); }
        function clearNote() { if(confirm('ล้างบันทึกทั้งหมดหรือไม่?')) document.getElementById('quick-note-area').value = ''; }

        function handleLogoutClick() {
            if(confirm('คุณต้องการออกจากระบบใช่หรือไม่?')) {
                document.getElementById('logout-overlay').style.display = 'flex';
                setTimeout(() => location.reload(), 2000);
            }
        }
    </script>
</body>
</html>
